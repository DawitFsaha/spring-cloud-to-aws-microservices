version: '3.8'

services:

  # ─── Zipkin ────────────────────────────────────────────────────────────────

  zipkin:
    image: openzipkin/zipkin:3
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - app-net

  # ─── ELK Stack ─────────────────────────────────────────────────────────────

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    networks:
      - app-net

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: logstash
    ports:
      - "5001:5000"
    volumes:
      - ./elk/logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      - elasticsearch
    networks:
      - app-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - app-net

  # ─── Kafka (KRaft single-node) ────────────────────────────────────────────

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"   # external (host machine)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - app-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app-net

  # ─── Consul Cluster ────────────────────────────────────────────────────────

  consul-server-1:
    image: hashicorp/consul:latest
    container_name: consul-server-1
    command: "agent -server -bootstrap-expect=3 -client=0.0.0.0 -ui -retry-join=consul-server-2 -retry-join=consul-server-3"
    ports:
      - "8500:8500"   # UI and HTTP API
      - "8600:8600/udp" # DNS
    networks:
      - consul-net
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 5

  consul-server-2:
    image: hashicorp/consul:latest
    container_name: consul-server-2
    command: "agent -server -client=0.0.0.0 -ui -retry-join=consul-server-1 -retry-join=consul-server-3"
    ports:
      - "8501:8500"   # UI and HTTP API (different host port)
    networks:
      - consul-net
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 5

  consul-server-3:
    image: hashicorp/consul:latest
    container_name: consul-server-3
    command: "agent -server -client=0.0.0.0 -ui -retry-join=consul-server-1 -retry-join=consul-server-2"
    ports:
      - "8502:8500"   # UI and HTTP API (different host port)
    networks:
      - consul-net
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MongoDB ───────────────────────────────────────────────────────────────

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Stock Service instance 1 (returns fixed stock = 100) ─────────────────

  stock-service-1:
    build:
      context: ./stock-service
      dockerfile: Dockerfile
    container_name: stock-service-1
    environment:
      - MONGODB_HOST=mongodb
      - CONSUL_HOST=consul-server-2
      - CONSUL_PORT=8500
      - CONSUL_INSTANCE_ID=stock-service-1
      - STOCK_FIXED_VALUE=-1
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - CONFIG_SERVER_URL=http://config-server:8888
      - ZIPKIN_ENDPOINT=http://zipkin:9411/api/v2/spans
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5000
    ports:
      - "8900:8900"
    depends_on:
      mongodb:
        condition: service_healthy
      consul-server-2:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_started
    networks:
      - app-net
      - consul-net

  # ─── Stock Service instance 2 (returns fixed stock = 50) ──────────────────

  stock-service-2:
    build:
      context: ./stock-service
      dockerfile: Dockerfile
    container_name: stock-service-2
    environment:
      - MONGODB_HOST=mongodb
      - CONSUL_HOST=consul-server-2
      - CONSUL_PORT=8500
      - CONSUL_INSTANCE_ID=stock-service-2
      - STOCK_FIXED_VALUE=-1
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - CONFIG_SERVER_URL=http://config-server:8888
      - ZIPKIN_ENDPOINT=http://zipkin:9411/api/v2/spans
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5000
    ports:
      - "8902:8900"
    depends_on:
      mongodb:
        condition: service_healthy
      consul-server-2:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_started
    networks:
      - app-net
      - consul-net

  # ─── API Gateway (registers with consul-server-3, port 8080) ─────────────

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    environment:
      - CONSUL_HOST=consul-server-3
      - CONSUL_PORT=8500
      - CONFIG_SERVER_URL=http://config-server:8888
      - ZIPKIN_ENDPOINT=http://zipkin:9411/api/v2/spans
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5000
    ports:
      - "8080:8080"
    depends_on:
      consul-server-3:
        condition: service_healthy
      product-service:
        condition: service_started
      stock-service-1:
        condition: service_started
      stock-service-2:
        condition: service_started
      order-service:
        condition: service_started
      config-server:
        condition: service_started
    networks:
      - app-net
      - consul-net

  # ─── Product Service (registers with consul-server-1) ─────────────────────

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    environment:
      - MONGODB_HOST=mongodb
      - CONSUL_HOST=consul-server-1
      - CONSUL_PORT=8500
      - CONFIG_SERVER_URL=http://config-server:8888
      - ZIPKIN_ENDPOINT=http://zipkin:9411/api/v2/spans
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5000
    ports:
      - "8901:8901"
    depends_on:
      mongodb:
        condition: service_healthy
      consul-server-1:
        condition: service_healthy
      stock-service-1:
        condition: service_started
      stock-service-2:
        condition: service_started
      config-server:
        condition: service_started
    networks:
      - app-net
      - consul-net

  # ─── Order Service (registers with consul-server-1) ───────────────────────

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    environment:
      - MONGODB_HOST=mongodb
      - CONSUL_HOST=consul-server-1
      - CONSUL_PORT=8500
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - CONFIG_SERVER_URL=http://config-server:8888
      - ZIPKIN_ENDPOINT=http://zipkin:9411/api/v2/spans
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5000
    ports:
      - "8903:8903"
    depends_on:
      mongodb:
        condition: service_healthy
      consul-server-1:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_started
    networks:
      - app-net
      - consul-net

  # ─── Config Server (Git-backed) ────────────────────────────────────────────

  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    container_name: config-server
    environment:
      - CONSUL_HOST=consul-server-1
      - CONSUL_PORT=8500
      - CONFIG_GIT_URI=https://github.com/d-kimanthi/temp_config_repo
      - CONFIG_GIT_LABEL=main
      - ZIPKIN_ENDPOINT=http://zipkin:9411/api/v2/spans
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5000
    ports:
      - "8888:8888"
    depends_on:
      consul-server-1:
        condition: service_healthy
    networks:
      - app-net
      - consul-net

networks:
  consul-net:
    driver: bridge
  app-net:
    driver: bridge

volumes:
  mongo-data:
