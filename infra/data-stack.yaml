AWSTemplateFormatVersion: "2010-09-09"
Description: Data layer starter (Amazon DocumentDB + per-service Mongo URI secrets).

Parameters:
  ProjectName:
    Type: String
    Default: cs590-microservices
  Environment:
    Type: String
    Default: demo
  PrivateDataSubnetAId:
    Type: AWS::EC2::Subnet::Id
  PrivateDataSubnetBId:
    Type: AWS::EC2::Subnet::Id
  DocDbSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
  DbMasterUsername:
    Type: String
    Default: appadmin
  DbInstanceClass:
    Type: String
    Default: db.t3.medium

Resources:
  DocumentDbMasterSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub /${ProjectName}/${Environment}/docdb/master
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username":"${DbMasterUsername}"}'
        GenerateStringKey: password
        ExcludePunctuation: true
        PasswordLength: 24

  DocumentDbSubnetGroup:
    Type: AWS::DocDB::DBSubnetGroup
    Properties:
      DBSubnetGroupName: !Sub ${ProjectName}-${Environment}-docdb-subnets
      DBSubnetGroupDescription: Subnet group for DocumentDB
      SubnetIds:
        - !Ref PrivateDataSubnetAId
        - !Ref PrivateDataSubnetBId

  DocumentDbCluster:
    Type: AWS::DocDB::DBCluster
    Properties:
      DBClusterIdentifier: !Sub ${ProjectName}-${Environment}-docdb
      DBSubnetGroupName: !Ref DocumentDbSubnetGroup
      VpcSecurityGroupIds:
        - !Ref DocDbSecurityGroupId
      MasterUsername: !Sub "{{resolve:secretsmanager:${DocumentDbMasterSecret}:SecretString:username}}"
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${DocumentDbMasterSecret}:SecretString:password}}"
      Port: 27017
      StorageEncrypted: true

  DocumentDbInstanceA:
    Type: AWS::DocDB::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DocumentDbCluster
      DBInstanceClass: !Ref DbInstanceClass
      DBInstanceIdentifier: !Sub ${ProjectName}-${Environment}-docdb-a

  ProductMongoUriSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub /${ProjectName}/${Environment}/product-service/mongodb-uri
      SecretString: !Sub
        - mongodb://${DbUser}:${DbPass}@${Endpoint}:27017/product_db?tls=false&retryWrites=false
        - DbUser: !Sub "{{resolve:secretsmanager:${DocumentDbMasterSecret}:SecretString:username}}"
          DbPass: !Sub "{{resolve:secretsmanager:${DocumentDbMasterSecret}:SecretString:password}}"
          Endpoint: !GetAtt DocumentDbCluster.Endpoint

  StockMongoUriSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub /${ProjectName}/${Environment}/stock-service/mongodb-uri
      SecretString: !Sub
        - mongodb://${DbUser}:${DbPass}@${Endpoint}:27017/stock_db?tls=false&retryWrites=false
        - DbUser: !Sub "{{resolve:secretsmanager:${DocumentDbMasterSecret}:SecretString:username}}"
          DbPass: !Sub "{{resolve:secretsmanager:${DocumentDbMasterSecret}:SecretString:password}}"
          Endpoint: !GetAtt DocumentDbCluster.Endpoint

  OrderMongoUriSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub /${ProjectName}/${Environment}/order-service/mongodb-uri
      SecretString: !Sub
        - mongodb://${DbUser}:${DbPass}@${Endpoint}:27017/order_db?tls=false&retryWrites=false
        - DbUser: !Sub "{{resolve:secretsmanager:${DocumentDbMasterSecret}:SecretString:username}}"
          DbPass: !Sub "{{resolve:secretsmanager:${DocumentDbMasterSecret}:SecretString:password}}"
          Endpoint: !GetAtt DocumentDbCluster.Endpoint

Outputs:
  DocumentDbEndpoint:
    Value: !GetAtt DocumentDbCluster.Endpoint
    Export:
      Name: !Sub ${ProjectName}-${Environment}-DocumentDbEndpoint
  ProductMongoUriSecretArn:
    Value: !Ref ProductMongoUriSecret
    Export:
      Name: !Sub ${ProjectName}-${Environment}-ProductMongoUriSecretArn
  StockMongoUriSecretArn:
    Value: !Ref StockMongoUriSecret
    Export:
      Name: !Sub ${ProjectName}-${Environment}-StockMongoUriSecretArn
  OrderMongoUriSecretArn:
    Value: !Ref OrderMongoUriSecret
    Export:
      Name: !Sub ${ProjectName}-${Environment}-OrderMongoUriSecretArn
