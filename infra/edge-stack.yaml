AWSTemplateFormatVersion: "2010-09-09"
Description: Edge layer starter (internal ALB, API Gateway HTTP API + VPC Link, WAF).

Parameters:
  ProjectName:
    Type: String
    Default: cs590-microservices
  Environment:
    Type: String
    Default: demo
  VpcId:
    Type: AWS::EC2::VPC::Id
  PrivateAppSubnetAId:
    Type: AWS::EC2::Subnet::Id
  PrivateAppSubnetBId:
    Type: AWS::EC2::Subnet::Id
  AlbSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
  VpcLinkSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id

Resources:
  InternalAlb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-internal-alb
      Type: application
      Scheme: internal
      SecurityGroups:
        - !Ref AlbSecurityGroupId
      Subnets:
        - !Ref PrivateAppSubnetAId
        - !Ref PrivateAppSubnetBId

  OrderTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-order-tg
      Port: 8903
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckPath: /actuator/health

  ProductTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-product-tg
      Port: 8901
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckPath: /actuator/health

  StockTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-stock-tg
      Port: 8900
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckPath: /actuator/health

  AlbHttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref InternalAlb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: "404"
            ContentType: application/json
            MessageBody: '{"message":"No matching route"}'

  OrderRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref AlbHttpListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values:
              - /order/*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref OrderTargetGroup

  ProductRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref AlbHttpListener
      Priority: 20
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values:
              - /product/*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref ProductTargetGroup

  StockRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref AlbHttpListener
      Priority: 30
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values:
              - /stock/*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref StockTargetGroup

  HttpVpcLink:
    Type: AWS::ApiGatewayV2::VpcLink
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-http-vpc-link
      SecurityGroupIds:
        - !Ref VpcLinkSecurityGroupId
      SubnetIds:
        - !Ref PrivateAppSubnetAId
        - !Ref PrivateAppSubnetBId

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-http-api
      ProtocolType: HTTP

  AlbPrivateIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: HTTP_PROXY
      IntegrationMethod: ANY
      ConnectionType: VPC_LINK
      ConnectionId: !Ref HttpVpcLink
      IntegrationUri: !Ref AlbHttpListener
      PayloadFormatVersion: "1.0"

  OrderRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: ANY /order/{proxy+}
      Target: !Sub integrations/${AlbPrivateIntegration}

  ProductRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: ANY /product/{proxy+}
      Target: !Sub integrations/${AlbPrivateIntegration}

  StockRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: ANY /stock/{proxy+}
      Target: !Sub integrations/${AlbPrivateIntegration}

  DefaultStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true

  WebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-api-waf
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        CloudWatchMetricsEnabled: true
        MetricName: !Sub ${ProjectName}-${Environment}-waf
        SampledRequestsEnabled: true
      Rules:
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 0
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: common-rules
            SampledRequestsEnabled: true

  WebAclAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !Sub arn:aws:apigateway:${AWS::Region}::/apis/${HttpApi}/stages/$default
      WebACLArn: !GetAtt WebAcl.Arn

Outputs:
  HttpApiId:
    Value: !Ref HttpApi
    Export:
      Name: !Sub ${ProjectName}-${Environment}-HttpApiId
  HttpApiInvokeUrl:
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
    Export:
      Name: !Sub ${ProjectName}-${Environment}-HttpApiInvokeUrl
  InternalAlbDnsName:
    Value: !GetAtt InternalAlb.DNSName
    Export:
      Name: !Sub ${ProjectName}-${Environment}-InternalAlbDnsName
  OrderTargetGroupArn:
    Value: !Ref OrderTargetGroup
    Export:
      Name: !Sub ${ProjectName}-${Environment}-OrderTargetGroupArn
  ProductTargetGroupArn:
    Value: !Ref ProductTargetGroup
    Export:
      Name: !Sub ${ProjectName}-${Environment}-ProductTargetGroupArn
  StockTargetGroupArn:
    Value: !Ref StockTargetGroup
    Export:
      Name: !Sub ${ProjectName}-${Environment}-StockTargetGroupArn
