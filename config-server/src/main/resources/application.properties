server.port=8888
spring.application.name=config-server

spring.cloud.config.server.git.uri=${CONFIG_GIT_URI:https://github.com/d-kimanthi/temp_config_repo}
spring.cloud.config.server.git.default-label=${CONFIG_GIT_LABEL:main}
spring.cloud.config.server.git.clone-on-start=true

spring.cloud.consul.host=${CONSUL_HOST:localhost}
spring.cloud.consul.port=${CONSUL_PORT:8500}
spring.cloud.consul.discovery.register=true
spring.cloud.consul.discovery.prefer-ip-address=true
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s
spring.cloud.consul.discovery.instance-id=${spring.application.name}:${server.port}

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
management.endpoints.web.exposure.include=health,info